<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ares</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono text-sm">

<div class="h-screen flex flex-col">

  <!-- ====== TOP BAR ====== -->
  <header class="flex items-center gap-3 px-4 py-2 border-b border-gray-800 shrink-0">
    <h1 class="text-base font-bold tracking-tight text-green-400">ares</h1>
    <span id="daemon-status" class="px-2 py-0.5 rounded text-[10px] bg-gray-800">...</span>
    <span id="daemon-pid" class="text-gray-600 text-[10px]"></span>
    <form id="submit-form" class="flex flex-1 gap-1 ml-4">
      <input id="url-input" type="url" placeholder="Paste a YouTube or YouTube Music URL"
             class="flex-1 px-2 py-1.5 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:border-green-500 placeholder-gray-700 text-xs">
      <button type="submit" class="px-3 py-1.5 rounded bg-green-700 hover:bg-green-600 text-xs font-semibold">+</button>
    </form>
    <div id="submit-msg" class="text-[10px]"></div>
    <button id="btn-daemon" class="px-2 py-1 rounded text-[10px] bg-gray-800 hover:bg-gray-700">daemon</button>
  </header>

  <!-- ====== TAB BAR ====== -->
  <nav class="flex border-b border-gray-800 shrink-0">
    <button data-tab="downloader" class="tab-btn px-4 py-2 text-xs font-semibold uppercase tracking-wider text-gray-400 hover:text-gray-200 border-b-2 border-transparent">Downloader</button>
    <button data-tab="library" class="tab-btn px-4 py-2 text-xs font-semibold uppercase tracking-wider text-gray-400 hover:text-gray-200 border-b-2 border-transparent">Media Library</button>
  </nav>

  <!-- ====== MAIN ====== -->
  <div class="flex flex-1 overflow-hidden">

    <!-- TAB: Downloader -->
    <div id="panel-downloader" class="tab-panel flex-1 flex flex-col overflow-hidden hidden">

      <!-- downloading -->
      <section class="p-3 border-b border-gray-800">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" id="dl-indicator"></div>
          <h2 class="text-[10px] text-gray-500 uppercase tracking-wider">downloading</h2>
          <span id="dl-count" class="text-[10px] text-gray-700"></span>
          <span id="failed-info" class="text-[10px] text-red-700 hidden ml-auto"></span>
          <button id="btn-retry" class="text-[10px] px-1.5 py-0.5 rounded bg-red-900 hover:bg-red-800 hidden">retry</button>
          <button id="btn-clean-failed" class="text-[10px] px-1.5 py-0.5 rounded bg-gray-800 hover:bg-gray-700 hidden">clear</button>
          <div class="ml-auto flex items-center gap-1 text-[10px] text-gray-600">
            <span>max:</span>
            <select id="max-concurrent" class="bg-gray-900 border border-gray-700 rounded px-1 py-0.5 text-[10px] text-gray-300">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
        <div id="processing-list" class="space-y-1 min-h-[2rem]"></div>
        <div id="queued-list" class="mt-2 space-y-0.5"></div>
      </section>

      <!-- downloaded (raw) -->
      <section class="p-3 border-b border-gray-800 overflow-y-auto" style="max-height:30%">
        <div class="flex items-center gap-2 mb-2">
          <h2 class="text-[10px] text-gray-500 uppercase tracking-wider">downloaded</h2>
          <span id="pending-count" class="text-[10px] text-gray-700"></span>
          <button id="btn-clean-cache" class="text-[10px] px-1.5 py-0.5 rounded bg-gray-800 hover:bg-gray-700 hidden ml-auto">clear</button>
        </div>
        <div id="downloaded-list" class="space-y-0.5"></div>
      </section>

      <!-- log -->
      <details class="p-3 overflow-y-auto flex-1" open>
        <summary class="text-[10px] text-gray-600 uppercase tracking-wider mb-1 cursor-pointer">activity</summary>
        <pre id="log-lines" class="text-[10px] text-gray-700 leading-relaxed whitespace-pre-wrap"></pre>
      </details>

    </div>

    <!-- TAB: Media Library -->
    <div id="panel-library" class="tab-panel flex-1 flex overflow-hidden hidden">

      <!-- sidebar: albums -->
      <aside class="w-56 shrink-0 border-r border-gray-800 overflow-y-auto p-2 space-y-1">
        <div class="text-[10px] text-gray-600 uppercase tracking-wider px-2 mb-2">albums</div>
        <div id="album-list" class="space-y-1"></div>
      </aside>

      <!-- album detail -->
      <div class="flex-1 overflow-y-auto p-4">
        <div id="album-detail" class="text-gray-600 text-[10px]">select an album</div>
      </div>

    </div>

  </div>
</div>

<script>
const STATUS_INTERVAL = 2000;

async function api(path, opts) {
  const r = await fetch(path, opts || {});
  return r.json();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(0) + 'KB';
  return (bytes / 1048576).toFixed(1) + 'MB';
}

// --- tab switching ---

let currentTab = 'downloader';

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === currentTab) return;

    document.querySelectorAll('.tab-btn').forEach(b => {
      b.className = 'tab-btn px-4 py-2 text-xs font-semibold uppercase tracking-wider text-gray-400 hover:text-gray-200 border-b-2 border-transparent';
    });
    btn.className = 'tab-btn px-4 py-2 text-xs font-semibold uppercase tracking-wider text-green-400 border-b-2 border-green-500';

    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
    document.getElementById('panel-' + tab).classList.remove('hidden');

    currentTab = tab;
  });
});

document.querySelector('[data-tab="downloader"]').click();

// --- max concurrent ---

document.getElementById('max-concurrent').addEventListener('change', async () => {
  const val = parseInt(document.getElementById('max-concurrent').value);
  await api('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({max_concurrent: val}),
  });
});

// --- refresh ---

async function refresh() {
  const s = await api('/api/status');

  // daemon
  const ds = document.getElementById('daemon-status');
  if (s.daemon.running) {
    ds.textContent = 'RUNNING';
    ds.className = 'px-2 py-0.5 rounded text-[10px] bg-green-900 text-green-300';
  } else {
    ds.textContent = 'STOPPED';
    ds.className = 'px-2 py-0.5 rounded text-[10px] bg-red-900 text-red-300';
  }
  document.getElementById('daemon-pid').textContent = s.daemon.pid ? `PID ${s.daemon.pid}` : '';

  // max concurrent
  document.getElementById('max-concurrent').value = s.config.max_concurrent;

  // sidebar: albums grouped by artist
  const albumList = document.getElementById('album-list');
  if (s.processed.albums.length === 0) {
    albumList.innerHTML = '<div class="text-[10px] text-gray-700 px-2">no albums yet</div>';
  } else {
    const groups = {};
    s.processed.albums.forEach(a => {
      const parts = a.name.split(' - ');
      const artist = parts[0] || a.name;
      const album = parts.slice(1).join(' - ') || '';
      if (!groups[artist]) groups[artist] = [];
      groups[artist].push({...a, album});
    });

    albumList.innerHTML = Object.entries(groups).map(([artist, albums]) => {
      const total = albums.reduce((s, a) => s + a.tracks, 0);
      return `<details class="group" open>
        <summary class="flex items-center gap-2 px-2 py-1.5 rounded hover:bg-gray-900 cursor-pointer text-xs font-semibold text-gray-400">
          <span class="text-gray-600 text-[10px]">▶</span>
          ${escapeHtml(artist)}
          <span class="ml-auto text-[10px] text-gray-700">${total}</span>
        </summary>
        <div class="ml-2 space-y-0.5 mt-0.5">
          ${albums.map(a => `<div class="album-entry flex items-center gap-2 px-2 py-1 rounded hover:bg-gray-900 cursor-pointer" data-album="${escapeHtml(a.name)}">
            <img src="${escapeHtml(a.cover)}" alt="" class="w-6 h-6 rounded object-cover bg-gray-800"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22><rect fill=%22%231f2937%22 width=%2224%22 height=%2224%22/></svg>'">
            <div class="text-[10px] truncate text-gray-500">${escapeHtml(a.album)}</div>
            <span class="ml-auto text-[10px] text-gray-700">${a.tracks}</span>
          </div>`).join('')}
        </div>
      </details>`;
    }).join('');
  }

  // album detail view
  document.querySelectorAll('.album-entry').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.album;
      const album = s.processed.albums.find(a => a.name === name);
      if (!album) return;
      const detail = document.getElementById('album-detail');
      const parts = album.name.split(' - ');
      const artist = parts[0] || album.name;
      const albumName = parts.slice(1).join(' - ') || '';
      detail.innerHTML = `<div class="flex gap-6">
        <img src="${escapeHtml(album.cover)}" alt="" class="w-48 h-48 rounded object-cover bg-gray-800 shrink-0"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22192%22 height=%22192%22><rect fill=%22%231f2937%22 width=%22192%22 height=%22192%22/></svg>'">
        <div class="min-w-0">
          <div class="text-lg font-bold text-gray-100">${escapeHtml(artist)}</div>
          <div class="text-sm text-gray-400 mb-3">${escapeHtml(albumName)}</div>
          <div class="text-[10px] text-gray-600 uppercase tracking-wider mb-1">tracks (${album.tracks})</div>
          <ul class="space-y-0.5">
            ${album.songs.map((s, i) => `<li class="text-xs text-gray-400">${i+1}. ${escapeHtml(s.replace('.mp3', ''))}</li>`).join('')}
          </ul>
        </div>
      </div>`;
    });
  });

  // downloading section
  const pList = document.getElementById('processing-list');
  const indicator = document.getElementById('dl-indicator');
  if (s.processing_jobs.length > 0) {
    indicator.classList.remove('hidden');
    pList.innerHTML = s.processing_jobs.map(j => {
      const p = j.progress || {};
      const pct = p.percent || 0;
      const status = p.status || 'starting';
      const label = status === 'converting' ? '🎵 converting' : status === 'processing' ? '📦 processing' : status === 'downloading' ? `⬇ ${pct}%` : status;
      const itemInfo = p.total > 0 ? ` ${p.item}/${p.total}` : '';
      const speed = p.speed ? ` ${p.speed}` : '';
      const eta = p.eta ? ` ETA ${p.eta}` : '';
      return `<div class="mb-2">
        <div class="flex items-center gap-2 text-xs text-gray-400 mb-1">
          <div class="w-1 h-1 rounded-full bg-green-400 animate-ping"></div>
          <span class="truncate">${escapeHtml(j.url)}</span>
          <div class="flex items-center gap-2 ml-auto shrink-0">
            <span class="text-gray-500">${speed}</span>
            <span class="text-gray-300 font-semibold">${eta}</span>
            <span class="text-gray-500">${label}</span>
          </div>
        </div>
        <div class="relative w-full h-5 bg-gray-800 rounded-full overflow-hidden">
          <div class="h-full bg-green-700 rounded-full transition-all duration-500 flex items-center justify-end pr-2" style="width:${Math.min(pct, 100)}%">
            <span class="text-[10px] text-green-300 font-bold mix-blend-difference">${Math.min(pct, 100).toFixed(0)}%</span>
          </div>
          ${pct === 0 ? '<span class="absolute inset-0 flex items-center justify-center text-[10px] text-gray-600">waiting...</span>' : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    indicator.classList.add('hidden');
    pList.innerHTML = '<div class="text-[10px] text-gray-700">idle</div>';
  }
  document.getElementById('dl-count').textContent = s.queue.pending > 0 ? `+${s.queue.pending} queued` : '';

  // queued items
  const qList = document.getElementById('queued-list');
  if (s.queue.items && s.queue.items.length > 0) {
    qList.innerHTML = s.queue.items.map((url, i) =>
      `<div class="flex items-center gap-2 text-[11px] text-gray-600">
        <span class="text-gray-700 font-semibold w-4 text-right">#${i + 1}</span>
        <span class="truncate">${escapeHtml(url)}</span>
      </div>`
    ).join('');
  } else {
    qList.innerHTML = '';
  }

  // failed
  const failedInfo = document.getElementById('failed-info');
  const retryBtn = document.getElementById('btn-retry');
  const cleanFailedBtn = document.getElementById('btn-clean-failed');
  if (s.queue.failed > 0) {
    failedInfo.textContent = `${s.queue.failed} failed`;
    failedInfo.classList.remove('hidden');
    retryBtn.classList.remove('hidden');
    cleanFailedBtn.classList.remove('hidden');
  } else {
    failedInfo.classList.add('hidden');
    retryBtn.classList.add('hidden');
    cleanFailedBtn.classList.add('hidden');
  }

  // downloaded section
  const dlList = document.getElementById('downloaded-list');
  if (s.downloaded.files.length === 0) {
    dlList.innerHTML = '<div class="text-[10px] text-gray-700">empty</div>';
  } else {
    dlList.innerHTML = s.downloaded.files.map(f =>
      `<div class="flex items-center gap-2 text-[11px]">
        <span class="text-gray-500">${escapeHtml(f.name)}</span>
        <span class="text-gray-700 ml-auto">${fmtSize(f.size)}</span>
      </div>`
    ).join('');
  }
  document.getElementById('pending-count').textContent = s.queue.pending > 0 ? `(${s.queue.pending} in queue)` : '';
  const btnCache = document.getElementById('btn-clean-cache');
  btnCache.classList.toggle('hidden', s.downloaded.count === 0);

  // log
  document.getElementById('log-lines').textContent = s.logs.join('\n');
}

// --- event listeners ---

document.getElementById('submit-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('url-input');
  const msg = document.getElementById('submit-msg');
  const url = input.value.trim();
  if (!url) return;

  const r = await api('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url}),
  });

  if (r.ok) {
    msg.innerHTML = `<span class="text-green-500">queued</span>`;
    input.value = '';
  } else if (r.duplicate) {
    msg.innerHTML = `<span class="text-yellow-600">duplicate</span>`;
  } else {
    msg.innerHTML = `<span class="text-red-500">${escapeHtml(r.error)}</span>`;
  }
  setTimeout(() => msg.innerHTML = '', 2500);
  refresh();
});

document.getElementById('btn-daemon').addEventListener('click', async () => {
  const s = await api('/api/status');
  if (s.daemon.running) {
    await api('/api/daemon/stop', {method: 'POST'});
  } else {
    await api('/api/daemon/start', {method: 'POST'});
  }
  refresh();
});

document.getElementById('btn-clean-cache').addEventListener('click', async () => {
  if (!confirm('Delete all files in downloaded/?')) return;
  await api('/api/clean/cache', {method: 'POST'});
  refresh();
});

document.getElementById('btn-retry').addEventListener('click', async () => {
  await api('/api/retry', {method: 'POST'});
  refresh();
});

document.getElementById('btn-clean-failed').addEventListener('click', async () => {
  if (!confirm('Delete all failed jobs?')) return;
  await api('/api/clean/failed', {method: 'POST'});
  refresh();
});

refresh();
setInterval(refresh, STATUS_INTERVAL);
</script>
</body>
</html>
